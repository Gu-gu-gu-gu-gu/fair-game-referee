<div id="fair-game-referee-settings" class="inline-drawer">
  <div class="inline-drawer-toggle inline-drawer-header">
    <b>游戏裁定器</b>
    <div class="inline-drawer-icon fa-solid fa-circle-chevron-down"></div>
  </div>

  <div class="inline-drawer-content">
    <div class="settings_section flex-container alignItemsCenter">
      <input type="checkbox" id="fgr-enabled" />
      <label for="fgr-enabled">启用插件</label>
    </div>

    <div class="settings_section flex-container alignItemsCenter">
      <input type="checkbox" id="fgr-longpress-enabled" />
      <label for="fgr-longpress-enabled">启用长按扩展按钮打开面板</label>
    </div>

    <div class="settings_section">
      <div class="fgr-settings-btn-row">
        <button id="fgr-open-panel" class="menu_button" type="button">打开游戏裁定面板</button>
      </div>
    </div>

    <div class="settings_section">
      <small style="opacity:.8;">
        关键词、外部LLM配置、地图编辑都在“游戏裁定面板”里统一设置。
      </small>
    </div>
  </div>
</div>
